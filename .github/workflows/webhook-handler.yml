name: Webhook Handler - Issue Event

on:
  issues:
    types: [opened, labeled, reopened]

permissions:
  contents: read
  issues: write

jobs:
  trigger-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Parse issue labels
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.issue.labels || []).map((l) => l.name)
            const agentLabel = labels.find((name) => name.startsWith("agent:")) || ""
            const agent = agentLabel ? agentLabel.replace("agent:", "") : ""

            core.setOutput("agent", agent)
            core.setOutput("has_agent", String(Boolean(agent)))
            core.setOutput("issue_number", String(context.payload.issue.number))
            core.setOutput("issue_title", context.payload.issue.title || "")

      - name: Comment starting work
        if: steps.parse.outputs.has_agent == 'true'
        uses: actions/github-script@v7
        env:
          AGENT_NAME: ${{ steps.parse.outputs.agent }}
        with:
          script: |
            const agent = process.env.AGENT_NAME || "unknown-agent"
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **Agent Triggered:** ${agent}\n\nStatus: Initializing...\n\n_Initial triage completed. Continue with manual /build execution for MVP._`
            })

      - name: Update status label (preserve non-status labels)
        if: steps.parse.outputs.has_agent == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const currentLabels = (context.payload.issue.labels || []).map((l) => l.name)
            const withoutStatus = currentLabels.filter((name) => !name.startsWith("status:"))
            const nextLabels = [...withoutStatus, "status:in-progress"]

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: nextLabels
            })

      - name: Log for manual processing
        shell: bash
        run: |
          echo "Issue #${{ steps.parse.outputs.issue_number }}: ${{ steps.parse.outputs.issue_title }}"
          echo "Agent: ${{ steps.parse.outputs.agent }}"
          echo "Ready for manual /build execution."
